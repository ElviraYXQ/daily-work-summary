name: Daily Industry News

on:
  schedule:
    - cron: '0 2 * * *'  # 每天 10:00 北京时间 (UTC+8)
  workflow_dispatch:  # 允许手动触发测试

jobs:
  news:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        pip install requests

    - name: Install lark-cli
      run: |
        npm install -g @larksuiteoapi/lark-cli

    - name: Configure lark-cli
      env:
        LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
        LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
      run: |
        lark-cli config init --app-id "$LARK_APP_ID" --app-secret-stdin <<< "$LARK_APP_SECRET"
        echo "${{ secrets.LARK_USER_TOKEN }}" | lark-cli auth set-user-token

    - name: Run industry news script
      env:
        SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
        ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
        LARK_USER_ID: ou_cc38ac881bcf17d997f0cad7d9a9a621
      run: |
        python3 collect_industry_news_v2.py

    - name: Commit news file
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add news_*.md
        git diff --staged --quiet || git commit -m "Daily industry news $(date +'%Y-%m-%d')"
        git push || true
