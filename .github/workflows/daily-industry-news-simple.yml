name: Daily Industry News (Simple)

on:
  schedule:
    - cron: '0 2 * * *'  # 每天 10:00 北京时间 (UTC+8)
  workflow_dispatch:  # 允许手动触发测试

jobs:
  news:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        pip install requests

    - name: Generate industry news
      env:
        SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
        CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
      run: |
        # 生成新闻（不推送飞书）
        python3 <<'PYTHON'
        import os
        os.environ['LARK_USER_ID'] = 'ou_cc38ac881bcf17d997f0cad7d9a9a621'

        # 加载脚本主体
        exec(open('collect_industry_news_v2.py').read().replace(
            'send_to_lark(summary)',
            'print("✅ 新闻生成完成，跳过飞书推送")'
        ))
        PYTHON

    - name: Commit news file
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add news_*.md
        git diff --staged --quiet || git commit -m "Daily industry news $(date +'%Y-%m-%d')"
        git push || true

    - name: Show news preview
      run: |
        echo "📰 今日新闻预览："
        head -50 news_$(date +'%Y%m%d').md
